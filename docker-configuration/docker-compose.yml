services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    # Removed deprecated startup option that causes MySQL 8.4 to fail.
    # If you need 'mysql_native_password' set a compatible server version or configure users later.
    environment:
      MYSQL_DATABASE: marketplace
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Mcitp@123}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - marketplace-net

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - marketplace-net

  # elasticsearch:
  #   image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
  #   restart: unless-stopped
  #   environment:
  #     discovery.type: single-node
  #     xpack.security.enabled: "false"
  #   ports:
  #     - "9200:9200"
  #   volumes:
  #     - elastic-data:/usr/share/elasticsearch/data
  #   networks:
  #     - marketplace-net

  backend:
    build:
      context: .
      dockerfile: dockerfile/backend.Dockerfile
      args:
        BACKEND_REPO_URL: https://github.com/noorullahazizidxb/MarketPlace-Back-End-Node-Parisma.git
        BACKEND_REPO_REF: main
        GIT_USERNAME: ${GIT_USERNAME:-noorullahazizidxb}
      secrets:
        - git_password
    restart: unless-stopped
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-mysql://root:${MYSQL_ROOT_PASSWORD:-Mcitp@123}@mysql:3306/marketplace}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      ENABLE_ELASTIC_SEARCH: ${ENABLE_ELASTIC_SEARCH:-false}
      ELASTICSEARCH_NODE: ${ELASTICSEARCH_NODE:-http://elasticsearch:9200}
      ELASTICSEARCH_USERNAME: ${ELASTICSEARCH_USERNAME:-}
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD:-}
      ELASTICSEARCH_INDEX: ${ELASTICSEARCH_INDEX:-listings}
      ELASTICSEARCH_USERS_INDEX: ${ELASTICSEARCH_USERS_INDEX:-users}
      ELASTICSEARCH_BLOGS_INDEX: ${ELASTICSEARCH_BLOGS_INDEX:-blogs}
      ELASTICSEARCH_ALLOW_SELF_SIGNED: ${ELASTICSEARCH_ALLOW_SELF_SIGNED:-true}
      TOKEN_SECRET: ${TOKEN_SECRET:-change_this_super_secret_value}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@devminds.net}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      WHATSAPP_FROM: ${WHATSAPP_FROM:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@devminds.net}
      ADMIN_PHONE: ${ADMIN_PHONE:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      UNAPPROVED_RETENTION_DAYS: ${UNAPPROVED_RETENTION_DAYS:-2}
      RENEW_WINDOW_DAYS: ${RENEW_WINDOW_DAYS:-14}
      MODERATION_CLEANUP_TIME: ${MODERATION_CLEANUP_TIME:-03:00}
      RENEWAL_CLEANUP_TIME: ${RENEWAL_CLEANUP_TIME:-06:00}
    depends_on:
      - mysql
      - redis
    ports:
      - "127.0.0.1:4000:4000"
    networks:
      - marketplace-net

  frontend:
    build:
      context: .
      dockerfile: dockerfile/frontend.Dockerfile
      args:
        FRONTEND_REPO_URL: https://github.com/noorullahazizidxb/MarketPlace-Next-JS.git
        FRONTEND_REPO_REF: main
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://api.devminds.net/api}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://api.devminds.net/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-https://api.devminds.net}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-https://api.devminds.net}
      BLOG_ORIGIN: ${BLOG_ORIGIN:-https://blog.devminds.net}
      MARKETPLACE_ORIGIN: ${MARKETPLACE_ORIGIN:-https://marketplace.devminds.net}
      NEXT_PUBLIC_ENABLE_ELASTIC_SEARCH: ${NEXT_PUBLIC_ENABLE_ELASTIC_SEARCH:-false}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      NEXT_PUBLIC_FACEBOOK_APP_ID: ${NEXT_PUBLIC_FACEBOOK_APP_ID:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      NEXT_PUBLIC_GOOGLE_AUTH_URL: ${NEXT_PUBLIC_GOOGLE_AUTH_URL:-/api/auth/google}
      NEXT_PUBLIC_FACEBOOK_AUTH_URL: ${NEXT_PUBLIC_FACEBOOK_AUTH_URL:-/api/auth/facebook}
      SESSION_SECRET: ${SESSION_SECRET:-change_this_session_secret_for_frontend}
      # Database access is usually not needed in frontend except if it hits prisma directly (it doesn't here usually)
      # DATABASE_URL: ${DATABASE_URL:-}
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - marketplace-net

  nginx:
    profiles:
      - edge
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/www:/var/www/certbot:ro
    networks:
      - marketplace-net

networks:
  marketplace-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  # elastic-data:

secrets:
  git_password:
    file: ./secrets/git_password.txt
